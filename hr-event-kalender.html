<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HR Event-Kalender | People Nova Circle</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.site-header{background:#001432;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.site-header img{height:32px;filter:brightness(0) invert(1)}
.site-header-sub{font-size:12px;color:#96BEFA;font-family:'Instrument Sans',sans-serif;letter-spacing:0.04em}
.page{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
.header{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
.header h1{font-size:22px;font-weight:400;color:#001432;font-family:'Instrument Serif',serif}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:12px;flex-wrap:wrap}
.filters{display:flex;gap:8px;flex-wrap:wrap}
select,input[type=text],input[type=date],input[type=url],textarea{font-size:13px;padding:8px 10px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#111}
select{cursor:pointer}
input:focus,select:focus,textarea:focus{outline:none;border-color:#FF5F32}
.btn-primary{background:#FF5F32;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:#e04e24}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-outline{background:transparent;color:#111;border:0.5px solid #ccc;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer}
.btn-outline:hover{background:#f0f0f0}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:2rem}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:10px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-title{font-size:15px;font-weight:500;color:#001432;line-height:1.4}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;white-space:nowrap;font-weight:500}
.badge-cat{background:#E6F1FB;color:#0C447C}
.badge-free{background:#EAF3DE;color:#3B6D11}
.badge-paid{background:#FAEEDA;color:#854F0B}
.meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:#666}
.star-on{color:#FFD778;font-size:14px}
.star-off{color:#ddd;font-size:14px}
.rating-count{font-size:12px;color:#888}
.card-desc{font-size:13px;color:#555;line-height:1.5}
.erfahrung-item{font-size:12px;color:#666;font-style:italic;border-left:2px solid #96BEFA;padding-left:8px;line-height:1.5;margin-bottom:4px}
.erfahrung-author{font-style:normal;font-weight:500;color:#333;display:block;margin-bottom:2px}
.card-actions{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center}
.btn-rate{background:transparent;border:0.5px solid #ccc;padding:5px 12px;border-radius:8px;font-size:12px;color:#555;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-rate:hover{background:#f5f5f5}
.btn-rate:disabled{opacity:0.5;cursor:not-allowed}
.btn-link{background:#0028D2;color:#fff;border:none;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.btn-link:hover{background:#001FAF}
.btn-delete{background:transparent;border:0.5px solid #fcc;padding:5px 10px;border-radius:8px;font-size:12px;color:#c0392b;cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-left:auto}
.btn-delete:hover{background:#fff0f0}
.empty-state{text-align:center;padding:3rem;color:#888;font-size:14px;grid-column:1/-1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:0.5px solid #ddd;padding:1.5rem;width:100%;max-width:520px;margin:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1.25rem;color:#001432}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%}
.form-group textarea{resize:vertical;min-height:72px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #eee}
.star-picker{display:flex;gap:6px;margin-top:6px}
.star-pick{font-size:28px;cursor:pointer;color:#ddd;line-height:1;transition:color 0.1s}
.star-pick.active{color:#FFD778}
.name-gate{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;text-align:center}
.name-gate p{font-size:14px;color:#555;margin-bottom:1rem;line-height:1.6}
.name-gate-row{display:flex;gap:8px;justify-content:center;max-width:380px;margin:0 auto}
.name-gate-row input{flex:1}
.member-bar{background:#E6F1FB;border-radius:8px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;font-size:13px}
.member-bar strong{color:#001432}
.btn-sm{background:transparent;border:0.5px solid #ccc;padding:4px 10px;border-radius:8px;font-size:12px;cursor:pointer;color:#666}
.btn-sm:hover{background:#fff}
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#001432;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;white-space:nowrap}
.loading{text-align:center;padding:2rem;color:#888;font-size:14px;grid-column:1/-1}
.eingetragen-von{font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="site-header">
  <img src="https://peoplenova.github.io/People-Nova-Event-Kalender/Logo_Neu.jpeg" alt="People Nova" />
  <span class="site-header-sub">HR Event-Kalender · nur für Circle Mitglieder</span>
</div>
<div class="page">
  <div class="header">
    <h1>HR Event-Kalender</h1>
  </div>

  <div id="name-gate-section" class="name-gate">
    <p>
      <i class="ti ti-users" style="font-size:22px;display:block;margin-bottom:8px;color:#FF5F32" aria-hidden="true"></i>
      Dieser Kalender ist nur für People Nova Circle Mitglieder.<br>
      Bitte gib Deinen Namen ein, um Events einzutragen und zu bewerten.
    </p>
    <div class="name-gate-row">
      <input type="text" id="gate-name" placeholder="Dein Vor- und Nachname" />
      <button class="btn-primary" onclick="setMember()">
        <i class="ti ti-arrow-right" aria-hidden="true"></i> Los
      </button>
    </div>
  </div>

  <div id="member-bar-section" class="member-bar" style="display:none">
    <span>Eingeloggt als <strong id="member-display"></strong></span>
    <button class="btn-sm" onclick="logoutMember()">Wechseln</button>
  </div>

  <div class="top-bar">
    <div class="filters">
      <select id="filter-stadt" onchange="loadEvents()">
        <option value="">Alle Städte</option>
        <option>Berlin</option><option>Hamburg</option><option>München</option><option>Frankfurt</option>
        <option>Köln</option><option>Düsseldorf</option><option>Stuttgart</option><option>Leipzig</option>
        <option>Hannover</option><option>Nürnberg</option>
      </select>
      <select id="filter-cat" onchange="loadEvents()">
        <option value="">Alle Themen</option>
        <option>Recruiting</option><option>Learning & Development</option><option>People Analytics</option>
        <option>Employer Branding</option><option>Leadership</option><option>HR-Tech</option>
        <option>Diversity & Inclusion</option><option>Arbeitsrecht</option><option>Compensation</option>
      </select>
      <select id="filter-preis" onchange="loadEvents()">
        <option value="">Alle Preise</option>
        <option value="kostenlos">Kostenlos</option>
        <option value="kostenpflichtig">Kostenpflichtig</option>
      </select>
    </div>
    <button class="btn-primary" id="btn-add" onclick="openAddModal()" disabled>
      <i class="ti ti-plus" aria-hidden="true"></i> Event eintragen
    </button>
  </div>

  <div class="cards" id="cards-container">
    <div class="loading"><i class="ti ti-loader" aria-hidden="true"></i> Lädt...</div>
  </div>
</div>

<!-- Add Modal -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <h2><i class="ti ti-calendar-plus" aria-hidden="true" style="margin-right:6px"></i>Neues HR Event eintragen</h2>
    <div class="form-group">
      <label>Titel *</label>
      <input type="text" id="f-titel" placeholder="z.B. Future of Work Summit 2025" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Datum *</label>
        <input type="date" id="f-datum" />
      </div>
      <div class="form-group">
        <label>Stadt *</label>
        <select id="f-stadt">
          <option value="">Bitte wählen</option>
          <option>Berlin</option><option>Hamburg</option><option>München</option><option>Frankfurt</option>
          <option>Köln</option><option>Düsseldorf</option><option>Stuttgart</option><option>Leipzig</option>
          <option>Hannover</option><option>Nürnberg</option><option>Sonstige</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Veranstalter</label>
        <input type="text" id="f-veranstalter" placeholder="z.B. HR Pioneers" />
      </div>
      <div class="form-group">
        <label>Kategorie</label>
        <select id="f-kategorie">
          <option value="">Bitte wählen</option>
          <option>Recruiting</option><option>Learning & Development</option><option>People Analytics</option>
          <option>Employer Branding</option><option>Leadership</option><option>HR-Tech</option>
          <option>Diversity & Inclusion</option><option>Arbeitsrecht</option><option>Compensation</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Preis</label>
        <select id="f-preis-form">
          <option value="kostenlos">Kostenlos</option>
          <option value="kostenpflichtig">Kostenpflichtig</option>
        </select>
      </div>
      <div class="form-group">
        <label>Link (Website)</label>
        <input type="url" id="f-link" placeholder="https://..." />
      </div>
    </div>
    <div class="form-group">
      <label>Kurzbeschreibung</label>
      <textarea id="f-beschreibung" placeholder="Worum geht es? Was erwartet Teilnehmer?"></textarea>
    </div>
    <div class="form-group">
      <label>Eigene Erfahrungen (optional)</label>
      <textarea id="f-erfahrungen" placeholder="Was hat Dich überzeugt? Was war besonders?"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeAddModal()">Abbrechen</button>
      <button class="btn-primary" id="btn-submit-event" onclick="submitEvent()">
        <i class="ti ti-check" aria-hidden="true"></i> Eintragen
      </button>
    </div>
  </div>
</div>

<!-- Rate Modal -->
<div class="overlay" id="rate-modal">
  <div class="modal" style="max-width:420px">
    <h2>Event bewerten</h2>
    <p id="rate-event-title" style="font-size:13px;color:#666;margin-bottom:1.25rem"></p>
    <div class="form-group">
      <label>Deine Bewertung *</label>
      <div class="star-picker" id="star-picker">
        <span class="star-pick" data-v="1" onclick="setStar(1)">★</span>
        <span class="star-pick" data-v="2" onclick="setStar(2)">★</span>
        <span class="star-pick" data-v="3" onclick="setStar(3)">★</span>
        <span class="star-pick" data-v="4" onclick="setStar(4)">★</span>
        <span class="star-pick" data-v="5" onclick="setStar(5)">★</span>
      </div>
    </div>
    <div class="form-group">
      <label>Erfahrungsbericht (optional)</label>
      <textarea id="rate-text" placeholder="Was hat Dir gefallen? Was weniger?" style="min-height:72px"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeRateModal()">Abbrechen</button>
      <button class="btn-primary" id="btn-submit-rating" onclick="submitRating()">
        <i class="ti ti-star" aria-hidden="true"></i> Bewertung abgeben
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://iqgjbuhabwkafslbngzy.supabase.co';
var SUPABASE_KEY = 'sb_publishable_slF2VVQv3CMwzvSWXchYAA_509Oc9e5';

function sbFetch(path, options) {
  options = options || {};
  var headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': options.prefer || 'return=representation'
  };
  return fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: options.method || 'GET',
    headers: headers,
    body: options.body || undefined
  }).then(function(res) {
    if (!res.ok) {
      return res.json().then(function(err) { throw new Error(err.message || 'Fehler'); });
    }
    if (res.status === 204) return null;
    return res.json();
  });
}

var currentMember = null;
var ratingTarget = null;
var currentStar = 0;
var allEvents = [];
var allRatings = [];

function loadEvents() {
  var container = document.getElementById('cards-container');
  container.innerHTML = '<div class="loading"><i class="ti ti-loader" aria-hidden="true"></i> Lädt...</div>';
  var stadt = document.getElementById('filter-stadt').value;
  var kat = document.getElementById('filter-cat').value;
  var preis = document.getElementById('filter-preis').value;
  var query = 'events?select=*&order=datum.asc';
  if (stadt) query += '&stadt=eq.' + encodeURIComponent(stadt);
  if (kat) query += '&kategorie=eq.' + encodeURIComponent(kat);
  if (preis) query += '&preis=eq.' + encodeURIComponent(preis);

  sbFetch(query).then(function(events) {
    allEvents = events || [];
    if (!allEvents.length) {
      allRatings = [];
      renderCards();
      return;
    }
    var ids = allEvents.map(function(e) { return e.id; });
    return sbFetch('ratings?select=*&event_id=in.(' + ids.join(',') + ')').then(function(ratings) {
      allRatings = ratings || [];
      renderCards();
    });
  }).catch(function(err) {
    container.innerHTML = '<div class="empty-state">Fehler: ' + err.message + '</div>';
  });
}

function renderCards() {
  var container = document.getElementById('cards-container');
  if (!allEvents.length) {
    container.innerHTML = '<div class="empty-state"><i class="ti ti-calendar-off" style="font-size:32px;display:block;margin-bottom:8px" aria-hidden="true"></i>Keine Events gefunden. Trag das erste ein!</div>';
    return;
  }
  container.innerHTML = allEvents.map(function(e) {
    var ratings = allRatings.filter(function(r) { return r.event_id === e.id; });
    var starRatings = ratings.filter(function(r) { return r.stars !== null; });
    var avg = starRatings.length ? starRatings.reduce(function(a, b) { return a + b.stars; }, 0) / starRatings.length : 0;
    var d = new Date(e.datum + 'T12:00:00');
    var ds = d.toLocaleDateString('de-DE', {day:'2-digit', month:'short', year:'numeric'});
    var erfahrungen = ratings.filter(function(r) { return r.erfahrung; }).slice(0, 2);
    var alreadyRated = currentMember && ratings.some(function(r) { return r.mitglied_name === currentMember && r.stars !== null; });
    var canDelete = currentMember && currentMember === e.eingetragen_von;

    var starsHtml = '';
    for (var i = 1; i <= 5; i++) {
      starsHtml += '<span class="' + (i <= Math.round(avg) ? 'star-on' : 'star-off') + '">★</span>';
    }

    var ratingSection = starRatings.length
      ? '<div style="display:flex;align-items:center;gap:8px">' + starsHtml + '<span class="rating-count">' + avg.toFixed(1) + ' (' + starRatings.length + ' Bewertung' + (starRatings.length !== 1 ? 'en' : '') + ')</span></div>'
      : '<div style="font-size:12px;color:#aaa">Noch keine Bewertung</div>';

    var erfahrungenHtml = erfahrungen.map(function(r) {
      return '<div class="erfahrung-item"><span class="erfahrung-author">' + r.mitglied_name + '</span>"' + r.erfahrung + '"</div>';
    }).join('');

    var rateBtn;
    if (!currentMember) {
      rateBtn = '<button class="btn-rate" disabled><i class="ti ti-lock" aria-hidden="true"></i> Bewerten</button>';
    } else if (alreadyRated) {
      rateBtn = '<button class="btn-rate" disabled><i class="ti ti-star-filled" aria-hidden="true"></i> Bewertet</button>';
    } else {
      rateBtn = '<button class="btn-rate" onclick="openRateModal(\'' + e.id + '\')"><i class="ti ti-star" aria-hidden="true"></i> Bewerten</button>';
    }

    var deleteBtn = canDelete
      ? '<button class="btn-delete" onclick="deleteEvent(\'' + e.id + '\')"><i class="ti ti-trash" aria-hidden="true"></i></button>'
      : '';

    var linkBtn = e.link
      ? '<a class="btn-link" href="' + e.link + '" target="_blank"><i class="ti ti-external-link" aria-hidden="true"></i> Website</a>'
      : '';

    return '<div class="card">'
      + '<div class="card-top"><span class="card-title">' + e.titel + '</span>'
      + (e.kategorie ? '<span class="badge badge-cat">' + e.kategorie + '</span>' : '')
      + '</div>'
      + '<div class="meta">'
      + '<span><i class="ti ti-calendar" aria-hidden="true"></i>' + ds + '</span>'
      + '<span><i class="ti ti-map-pin" aria-hidden="true"></i>' + e.stadt + '</span>'
      + (e.veranstalter ? '<span><i class="ti ti-building" aria-hidden="true"></i>' + e.veranstalter + '</span>' : '')
      + '<span class="badge ' + (e.preis === 'kostenlos' ? 'badge-free">Kostenlos' : 'badge-paid">Kostenpflichtig') + '</span>'
      + '</div>'
      + ratingSection
      + (e.beschreibung ? '<p class="card-desc">' + e.beschreibung + '</p>' : '')
      + erfahrungenHtml
      + '<div class="eingetragen-von">Eingetragen von ' + e.eingetragen_von + '</div>'
      + '<div class="card-actions">' + rateBtn + linkBtn + deleteBtn + '</div>'
      + '</div>';
  }).join('');
}

function setMember() {
  var n = document.getElementById('gate-name').value.trim();
  if (!n) { showToast('Bitte Deinen Namen eingeben.'); return; }
  currentMember = n;
  document.getElementById('name-gate-section').style.display = 'none';
  document.getElementById('member-bar-section').style.display = 'flex';
  document.getElementById('member-display').textContent = n;
  document.getElementById('btn-add').disabled = false;
  renderCards();
}

function logoutMember() {
  currentMember = null;
  document.getElementById('name-gate-section').style.display = 'block';
  document.getElementById('gate-name').value = '';
  document.getElementById('member-bar-section').style.display = 'none';
  document.getElementById('btn-add').disabled = true;
  renderCards();
}

function openAddModal() {
  if (!currentMember) { showToast('Bitte zuerst einloggen.'); return; }
  document.getElementById('add-modal').classList.add('open');
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

function submitEvent() {
  var titel = document.getElementById('f-titel').value.trim();
  var datum = document.getElementById('f-datum').value;
  var stadt = document.getElementById('f-stadt').value;
  if (!titel || !datum || !stadt) { showToast('Bitte Titel, Datum und Stadt ausfüllen.'); return; }
  var btn = document.getElementById('btn-submit-event');
  btn.disabled = true;
  btn.textContent = 'Wird gespeichert...';
  var newEvent = {
    titel: titel,
    datum: datum,
    stadt: stadt,
    veranstalter: document.getElementById('f-veranstalter').value.trim() || null,
    kategorie: document.getElementById('f-kategorie').value || null,
    preis: document.getElementById('f-preis-form').value,
    link: document.getElementById('f-link').value.trim() || null,
    beschreibung: document.getElementById('f-beschreibung').value.trim() || null,
    eingetragen_von: currentMember
  };
  sbFetch('events', { method: 'POST', body: JSON.stringify(newEvent) }).then(function(saved) {
    var erfahrung = document.getElementById('f-erfahrungen').value.trim();
    if (erfahrung && saved && saved[0]) {
      return sbFetch('ratings', {
        method: 'POST',
        body: JSON.stringify({ event_id: saved[0].id, mitglied_name: currentMember, stars: null, erfahrung: erfahrung })
      });
    }
  }).then(function() {
    closeAddModal();
    document.getElementById('f-titel').value = '';
    document.getElementById('f-datum').value = '';
    document.getElementById('f-veranstalter').value = '';
    document.getElementById('f-link').value = '';
    document.getElementById('f-beschreibung').value = '';
    document.getElementById('f-erfahrungen').value = '';
    document.getElementById('f-stadt').value = '';
    document.getElementById('f-kategorie').value = '';
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Eintragen';
    loadEvents();
    showToast('Event eingetragen. Danke!');
  }).catch(function(err) {
    showToast('Fehler: ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Eintragen';
  });
}

function openRateModal(id) {
  if (!currentMember) { showToast('Bitte zuerst einloggen.'); return; }
  ratingTarget = id;
  currentStar = 0;
  var e = allEvents.find(function(x) { return x.id === id; });
  document.getElementById('rate-event-title').textContent = e ? e.titel : '';
  document.getElementById('rate-text').value = '';
  setStar(0);
  document.getElementById('rate-modal').classList.add('open');
}

function closeRateModal() {
  document.getElementById('rate-modal').classList.remove('open');
  ratingTarget = null;
}

function setStar(n) {
  currentStar = n;
  document.querySelectorAll('.star-pick').forEach(function(s) {
    s.classList.toggle('active', parseInt(s.getAttribute('data-v')) <= n);
  });
}

function submitRating() {
  if (!currentStar) { showToast('Bitte Sterne vergeben.'); return; }
  var btn = document.getElementById('btn-submit-rating');
  btn.disabled = true;
  btn.textContent = 'Wird gespeichert...';
  sbFetch('ratings', {
    method: 'POST',
    body: JSON.stringify({
      event_id: ratingTarget,
      mitglied_name: currentMember,
      stars: currentStar,
      erfahrung: document.getElementById('rate-text').value.trim() || null
    })
  }).then(function() {
    closeRateModal();
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-star" aria-hidden="true"></i> Bewertung abgeben';
    loadEvents();
    showToast('Bewertung gespeichert. Danke!');
  }).catch(function(err) {
    showToast('Fehler: ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-star" aria-hidden="true"></i> Bewertung abgeben';
  });
}

function deleteEvent(id) {
  if (!confirm('Event wirklich löschen?')) return;
  sbFetch('events?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' }).then(function() {
    loadEvents();
    showToast('Event gelöscht.');
  }).catch(function(err) {
    showToast('Fehler: ' + err.message);
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.style.display = 'none'; }, 3500);
}

document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeAddModal();
});
document.getElementById('rate-modal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeRateModal();
});
document.getElementById('gate-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setMember();
});

loadEvents();
</script>
</body>
</html>
